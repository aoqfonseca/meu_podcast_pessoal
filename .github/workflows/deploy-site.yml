name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "podcast_processor/data/outputs/**"
      - "podcast_processor/site_src/**"
      - "podcast_processor/src/podcast_processor/publish.py"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: podcast_processor
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies (with site extras)
        run: uv sync --extra site

      - name: Generate posts + build site
        run: uv run podcast-processor build-site --output data/outputs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: podcast_processor/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
