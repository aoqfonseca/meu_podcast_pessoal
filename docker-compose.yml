services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: meu-podcast-pessoal:latest
    container_name: meu-podcast-pessoal
    environment:
      # --- API keys (set in .env at project root or export before running) ---
      # Required when PODCAST_LLM_PROVIDER=gemini (default).
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Required when PODCAST_LLM_PROVIDER=groq.
      GROQ_API_KEY: ${GROQ_API_KEY:-}

      # --- LLM provider ---
      PODCAST_LLM_PROVIDER: ${PODCAST_LLM_PROVIDER:-gemini}
      PODCAST_TEXT_MODEL: ${PODCAST_TEXT_MODEL:-gemini-2.5-flash-lite}
      PODCAST_GROQ_MODEL: ${PODCAST_GROQ_MODEL:-llama-3.3-70b-versatile}

      # --- TTS provider ---
      PODCAST_TTS_PROVIDER: ${PODCAST_TTS_PROVIDER:-edge}
      PODCAST_TTS_MODEL: ${PODCAST_TTS_MODEL:-gemini-2.5-flash-preview-tts}
      PODCAST_TTS_VOICE: ${PODCAST_TTS_VOICE:-Kore}
      PODCAST_EDGE_TTS_VOICE: ${PODCAST_EDGE_TTS_VOICE:-pt-BR-FranciscaNeural}

      # --- Embeddings ---
      PODCAST_EMBEDDING_MODEL: ${PODCAST_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}

      # --- Pipeline control ---
      # Extra flags forwarded to each CLI. Examples:
      #   FETCH_ARGS: "--tags IA,Rust --since-days 7"
      #   PROCESS_ARGS: "--skip-audio --llm-provider groq"
      FETCH_ARGS: ${FETCH_ARGS:-}
      PROCESS_ARGS: ${PROCESS_ARGS:-}
      # Comma-separated steps to run: fetch,process (default: both).
      #   STEPS=process   → skip the Rust fetcher, only run the LLM pipeline
      #   STEPS=fetch     → only fetch, skip the LLM pipeline
      STEPS: ${STEPS:-fetch,process}
    volumes:
      # Fetched feed JSONs from leitor_links.
      - ./leitor_links/output:/app/output
      # FAISS index + Hugging Face model cache + generated podcast outputs.
      - ./podcast_processor/data:/app/data
      # Mount the source list read-only so edits on the host take effect immediately.
      - ./links_fontes.json:/app/links_fontes.json:ro
